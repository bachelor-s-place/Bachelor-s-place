name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'go-backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'go-backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./go-backend
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.0'
        cache-dependency-path: go-backend/go.sum

    - name: Check formatting
      run: if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then echo "Formatting issues found. Run 'gofmt -w .'" && exit 1; fi

    - name: Install dependencies
      run: go mod download

    - name: Vet code
      run: go vet ./...

    - name: Build
      run: go build -v ./...

